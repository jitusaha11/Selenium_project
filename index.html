<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Dashboard Sidebar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard-layout">
    <aside class="sidebar" aria-labelledby="sidebar-title">
      <div class="sidebar__brand">
        <span class="sidebar__logo" aria-hidden="true">N</span>
        <div>
          <p class="sidebar__eyebrow">Workspace</p>
          <h1 id="sidebar-title" class="sidebar__title">Northstar</h1>
        </div>
      </div>

      <section class="sidebar__section" aria-labelledby="main-menu-title">
        <h2 id="main-menu-title" class="sidebar__heading">Main menu</h2>
        <nav class="sidebar__nav" aria-label="Main menu">
          <a class="sidebar__link sidebar__link--active" href="#" aria-current="page">
            <span class="sidebar__icon" aria-hidden="true">🏠</span>
            <span>Dashboard</span>
          </a>
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">📊</span>
            <span>Analytics</span>
          </a>
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">📁</span>
            <span>Projects</span>
          </a>
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">💬</span>
            <span>Messages</span>
          </a>
        </nav>
      </section>

      <section class="sidebar__section" aria-labelledby="workspace-tools-title">
        <h2 id="workspace-tools-title" class="sidebar__heading">Workspace</h2>
        <nav class="sidebar__nav" aria-label="Workspace tools">
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">🗂️</span>
            <span>Documents</span>
          </a>
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">👥</span>
            <span>Team</span>
          </a>
          <a class="sidebar__link" href="#">
            <span class="sidebar__icon" aria-hidden="true">⚙️</span>
            <span>Settings</span>
          </a>
        </nav>
      </section>

      <div class="sidebar__profile">
        <span class="sidebar__avatar" aria-hidden="true">AL</span>
        <div>
          <strong>Alex Lee</strong>
          <p>Product lead</p>
        </div>
      </div>
    </aside>

    <section class="dashboard-content" aria-labelledby="content-title">
      <p class="dashboard-content__eyebrow">Overview</p>
      <h2 id="content-title">Client Logos</h2>
      <p class="dashboard-content__intro">
        Showcase of our partners and clients.
      </p>

      <div class="logo-grid">
        <div class="logo-grid__item"><img src="client1.png" alt="Client 1 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 1</span></div>
        <div class="logo-grid__item"><img src="client2.png" alt="Client 2 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 2</span></div>
        <div class="logo-grid__item"><img src="client3.png" alt="Client 3 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 3</span></div>
        <div class="logo-grid__item"><img src="client4.png" alt="Client 4 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 4</span></div>
        <div class="logo-grid__item"><img src="client5.png" alt="Client 5 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 5</span></div>
        <div class="logo-grid__item"><img src="client6.png" alt="Client 6 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 6</span></div>
        <div class="logo-grid__item"><img src="client7.png" alt="Client 7 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 7</span></div>
        <div class="logo-grid__item"><img src="client8.png" alt="Client 8 Logo" class="logo-grid__image"><span class="logo-grid__name">Client 8</span></div>
      </div>
    </section>
  </main>
</body>
</html>
